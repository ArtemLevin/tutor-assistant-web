x-worker-common: &worker-common
  build:
    context: .
    args:
      INSTALL_TRANSCRIPTION: ${INSTALL_TRANSCRIPTION:-false}
  env_file: .env
  environment:
    DATABASE_URL: postgresql+psycopg://tutor:tutor@postgres:5432/tutor
    REDIS_URL: redis://redis:6379/0
    TASK_EAGER: "false"
    AUTO_MIGRATE: "false"
    ARTIFACT_STORAGE_ROOT: /data/artifacts
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  volumes:
    - artifact-data:/data/artifacts
  restart: unless-stopped
  stop_grace_period: 45s

services:
  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://tutor:tutor@postgres:5432/tutor
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://tutor:tutor@postgres:5432/tutor
      REDIS_URL: redis://redis:6379/0
      TASK_EAGER: "false"
      AUTO_MIGRATE: "false"
      ARTIFACT_STORAGE_ROOT: /data/artifacts
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - artifact-data:/data/artifacts
    restart: unless-stopped

  worker-transcription:
    <<: *worker-common
    command: ["celery", "-A", "tutor_assistant_web.worker.celery_app", "worker", "--loglevel=INFO", "--queues=transcription", "--hostname=transcription@%h"]

  worker-materials:
    <<: *worker-common
    command: ["celery", "-A", "tutor_assistant_web.worker.celery_app", "worker", "--loglevel=INFO", "--queues=materials", "--hostname=materials@%h"]

  worker-delivery:
    <<: *worker-common
    command: ["celery", "-A", "tutor_assistant_web.worker.celery_app", "worker", "--loglevel=INFO", "--queues=delivery", "--hostname=delivery@%h"]

  worker-maintenance:
    <<: *worker-common
    command: ["celery", "-A", "tutor_assistant_web.worker.celery_app", "worker", "--loglevel=INFO", "--queues=maintenance", "--hostname=maintenance@%h"]

  beat:
    build: .
    command: ["celery", "-A", "tutor_assistant_web.worker.celery_app", "beat", "--loglevel=INFO"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://tutor:tutor@postgres:5432/tutor
      REDIS_URL: redis://redis:6379/0
      TASK_EAGER: "false"
      AUTO_MIGRATE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tutor
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor -d tutor"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  artifact-data:
