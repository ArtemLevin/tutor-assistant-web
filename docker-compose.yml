services:
  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://tutor:tutor@postgres:5432/tutor
      REDIS_URL: redis://redis:6379/0
      TASK_EAGER: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      args:
        INSTALL_TRANSCRIPTION: ${INSTALL_TRANSCRIPTION:-false}
    command: ["celery", "-A", "tutor_assistant_web.worker.celery_app", "worker", "--loglevel=INFO"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://tutor:tutor@postgres:5432/tutor
      REDIS_URL: redis://redis:6379/0
      TASK_EAGER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: .
    command: ["celery", "-A", "tutor_assistant_web.worker.celery_app", "beat", "--loglevel=INFO"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://tutor:tutor@postgres:5432/tutor
      REDIS_URL: redis://redis:6379/0
      TASK_EAGER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tutor
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor -d tutor"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
