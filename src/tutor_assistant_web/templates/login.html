<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход · Tutor Assistant</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <span class="brand-mark large">T</span>
    <p class="eyebrow">Tutor Assistant</p>
    <h1>Рабочее пространство репетитора</h1>
    <p class="muted">Войдите в рабочее пространство своей организации.</p>
    {% if error %}<p class="alert">{{ error }}</p>{% endif %}
    <form method="post" action="/login" class="stack">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input type="hidden" name="next" value="{{ next }}">
      <label>Email<input type="email" name="email" value="{{ email or '' }}" autocomplete="username" autofocus required></label>
      <label>Пароль<input type="password" name="password" autocomplete="current-password" required></label>
      <button class="button primary wide" type="submit">Продолжить</button>
    </form>
  </main>
</body>
</html>
