global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: tutor-assistant
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/metrics_bearer_token
    file_sd_configs:
      - files: [/etc/prometheus/targets/active.json]
        refresh_interval: 5s
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: [pushgateway:9091]
